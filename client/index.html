<head>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace']
        },
        colors: {
          ink: { 50:'#f8f8f7', 100:'#e7e5e4', 200:'#d6d3d1', 300:'#a8a29e', 400:'#78716c', 500:'#57534e', 600:'#44403c', 700:'#292524', 800:'#1c1917', 900:'#0c0a09' },
          deped: { blue:'#003893', yellow:'#f5a623', red:'#c8102e' },
          brand: { 50:'#eff6ff', 100:'#dbeafe', 200:'#bfdbfe', 300:'#93c5fd', 400:'#60a5fa', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8', 800:'#1e40af', 900:'#1e3a8a' }
        },
        animation: {
          'fade-in': 'fadeIn .3s ease-out',
          'fade-in-up': 'fadeInUp .35s cubic-bezier(0.16, 1, 0.3, 1)',
          'slide-in-right': 'slideInRight .3s cubic-bezier(0.16, 1, 0.3, 1)',
          'scale-in': 'scaleIn .2s cubic-bezier(0.16, 1, 0.3, 1)',
          'shimmer': 'shimmer 2s linear infinite',
          'pulse-slow': 'pulse 3s ease-in-out infinite'
        },
        keyframes: {
          fadeIn: { '0%': { opacity: 0 }, '100%': { opacity: 1 } },
          fadeInUp: { '0%': { opacity: 0, transform: 'translateY(12px)' }, '100%': { opacity: 1, transform: 'translateY(0)' } },
          slideInRight: { '0%': { opacity: 0, transform: 'translateX(16px)' }, '100%': { opacity: 1, transform: 'translateX(0)' } },
          scaleIn: { '0%': { opacity: 0, transform: 'scale(0.96)' }, '100%': { opacity: 1, transform: 'scale(1)' } },
          shimmer: { '0%': { backgroundPosition: '-200% 0' }, '100%': { backgroundPosition: '200% 0' } }
        }
      }
    }
  }
</script>
<style>
  html, body { height: 100%; }
  body {
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    background: #fafaf9;
    color: #1c1917;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  /* Hide scrollbars but keep scrollable */
  .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
  .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
  .scrollbar-thin::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 3px; }
  .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
  .scrollbar-hide::-webkit-scrollbar { display: none; }

  /* Modern focus rings */
  input:focus, select:focus, textarea:focus, button:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    border-color: #3b82f6 !important;
  }

  /* Soft shadows */
  .shadow-soft { box-shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.06); }
  .shadow-soft-md { box-shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 8px rgba(0,0,0,.04); }
  .shadow-soft-lg { box-shadow: 0 4px 8px rgba(0,0,0,.06), 0 12px 24px rgba(0,0,0,.06); }

  /* Skeleton shimmer (Boneyard-inspired) */
  .skeleton {
    background: linear-gradient(90deg, #e7e5e4 0%, #f5f5f4 50%, #e7e5e4 100%);
    background-size: 200% 100%;
    animation: shimmer 2s linear infinite;
  }

  /* Modal overlay backdrop blur */
  .modal-backdrop { backdrop-filter: blur(6px) saturate(180%); -webkit-backdrop-filter: blur(6px) saturate(180%); }

  /* Print-friendly report */
  @media print {
    .no-print { display: none !important; }
    body { background: #fff; }
    .print-page { page-break-after: always; }
  }

  /* Subtle grain texture for depth (Boneyard touch) */
  .texture-grain::before {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    mix-blend-mode: multiply;
  }

  /* Smooth transitions on all interactive elements */
  button, a, .interactive { transition: all .18s cubic-bezier(0.16, 1, 0.3, 1); }

  /* Button press feedback */
  button:active:not(:disabled) { transform: scale(0.98); }

  /* Card hover lift (Boneyard skeleton-inspired warmth) */
  .lift-on-hover { transition: transform .2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow .2s; }
  .lift-on-hover:hover { transform: translateY(-2px); }

  /* Stagger animation for grid children */
  .stagger-children > * { animation: fadeInUp .4s cubic-bezier(0.16, 1, 0.3, 1) backwards; }
  .stagger-children > *:nth-child(1) { animation-delay: .03s; }
  .stagger-children > *:nth-child(2) { animation-delay: .06s; }
  .stagger-children > *:nth-child(3) { animation-delay: .09s; }
  .stagger-children > *:nth-child(4) { animation-delay: .12s; }
  .stagger-children > *:nth-child(5) { animation-delay: .15s; }
  .stagger-children > *:nth-child(6) { animation-delay: .18s; }
  .stagger-children > *:nth-child(7) { animation-delay: .21s; }
  .stagger-children > *:nth-child(8) { animation-delay: .24s; }
  .stagger-children > *:nth-child(9) { animation-delay: .27s; }
  .stagger-children > *:nth-child(10) { animation-delay: .30s; }

  /* Smooth checkmark draw animation */
  @keyframes checkmark-draw {
    0% { stroke-dashoffset: 100; }
    100% { stroke-dashoffset: 0; }
  }
  .checkmark-anim path {
    stroke-dasharray: 100;
    animation: checkmark-draw .5s cubic-bezier(0.65, 0, 0.45, 1) forwards;
  }

  /* Floating ring (radio/checkbox focus) */
  input[type="radio"]:checked + div,
  input[type="checkbox"]:checked + div {
    transition: all .2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Soft underline grow effect on links */
  .link-grow { position: relative; }
  .link-grow::after {
    content: ''; position: absolute; left: 0; bottom: -2px;
    width: 0; height: 1.5px; background: currentColor;
    transition: width .25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .link-grow:hover::after { width: 100%; }
</style>
